name: medly
description: A smart medicine assistant app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase (PostgreSQL backend)
  supabase_flutter: ^2.3.0

  # Location
  geolocator: ^11.0.0

  # Notifications (mobile push notifications)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Launch URLs (for navigation / maps)
  url_launcher: ^6.2.4

  # Icons
  cupertino_icons: ^1.0.6

  # HTTP
  http: ^1.2.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
